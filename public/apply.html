<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardova Capital — Apply Now</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html{overflow-x:hidden}
  body{font-family:'Manrope',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;color:#40424D;background:#fff;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}

  /* === TOPBAR === */
  .topbar{flex-shrink:0;background:#fff;border-bottom:1px solid #EDEFF7}
  .topbar-inner{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px}
  .topbar-logo{font-family:'Playfair Display',Georgia,serif;font-size:15px;font-weight:700;color:#0A0A0A;letter-spacing:1px;text-decoration:none;line-height:1.05;text-align:center}
  .topbar-logo span{display:block;font-weight:400;letter-spacing:3px;font-size:8px;color:#9DA2B3}
  .topbar-close{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#9DA2B3;border-radius:8px;cursor:pointer;transition:all 200ms;text-decoration:none}
  .topbar-close:hover{background:#F1F1F1;color:#1E1E24}

  /* === PROGRESS SECTION === */
  .progress-section{flex-shrink:0;background:#fff;padding:16px 20px;border-bottom:1px solid #EDEFF7}
  .progress-steps{display:flex;align-items:center;justify-content:center;gap:0;width:100%;max-width:400px;margin:0 auto}
  .progress-step{display:flex;flex-direction:column;align-items:center;position:relative;z-index:2}
  .progress-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all 300ms ease;border:2px solid #EDEFF7;background:#fff;color:#9DA2B3}
  .progress-dot.active{border-color:#0A0A0A;background:#0A0A0A;color:#C5A35D}
  .progress-dot.completed{border-color:#C5A35D;background:#C5A35D;color:#0A0A0A}
  .progress-step-label{font-size:9px;font-weight:600;color:#9DA2B3;margin-top:4px;white-space:nowrap;letter-spacing:0.3px}
  .progress-step.active .progress-step-label{color:#1E1E24}
  .progress-step.completed .progress-step-label{color:#C5A35D}
  .progress-connector{flex:1;height:2px;background:#EDEFF7;position:relative;margin:0 -2px;margin-bottom:18px}
  .progress-connector-fill{position:absolute;left:0;top:0;height:100%;background:#C5A35D;border-radius:2px;transition:width 400ms ease}
  @media(min-width:640px){.progress-section{padding:18px 24px}.progress-dot{width:32px;height:32px;font-size:12px}.progress-step-label{font-size:10px}}

  /* === MAIN CONTENT === */
  .main-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 16px 0}
  @media(min-width:640px){.main-area{padding:40px 32px 0;align-items:center}}
  .question-container{width:100%;max-width:520px;transition:all 250ms ease-out}
  
  
  .question-container.visible{opacity:1;transform:translateX(0)}

  /* === BACK BUTTON === */
  .back-btn{display:inline-flex;align-items:center;gap:6px;color:#9DA2B3;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:16px;margin-left:auto;margin-right:auto;transition:color 200ms;background:none;border:none;font-family:inherit}
  .back-btn:hover{color:#1E1E24}

  /* === QUESTION === */
  .question-title{font-size:22px;font-weight:800;color:#1E1E24;margin-bottom:24px;line-height:1.3;text-align:center}
  @media(min-width:640px){.question-title{font-size:26px}}
  .step-label{font-size:11px;font-weight:700;color:#C5A35D;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;text-align:center}

  /* === OPTION BUTTONS === */
  .option-list{display:flex;flex-direction:column;gap:8px}
  .opt-btn{width:100%;text-align:left;padding:14px 18px;border-radius:12px;border:2px solid #E8E8E8;background:#fff;font-size:15px;font-weight:500;color:#1E1E24;cursor:pointer;transition:all 150ms;font-family:'Manrope',sans-serif;min-height:48px;display:flex;align-items:center}
  .opt-btn:hover{border-color:rgba(10,10,10,0.3)}
  .opt-btn.selected{background:#0A0A0A;color:#fff;border-color:#0A0A0A}

  /* === YES/NO === */
  .toggle-row{display:flex;gap:10px}
  .toggle-btn{flex:1;padding:14px;border-radius:12px;border:2px solid #E8E8E8;text-align:center;font-size:15px;font-weight:600;color:#40424D;cursor:pointer;transition:all 150ms;background:#fff;font-family:'Manrope',sans-serif}
  .toggle-btn:hover{border-color:rgba(10,10,10,0.3)}
  .toggle-btn.selected{background:#0A0A0A;color:#fff;border-color:#0A0A0A}

  /* === TEXT INPUTS === */
  .text-input{width:100%;padding:14px 18px;border-radius:12px;border:2px solid #E8E8E8;font-size:16px;font-family:'Manrope',sans-serif;color:#1E1E24;outline:none;transition:all 200ms;min-height:52px;background:#FAFAFA}
  .text-input:focus{border-color:#0A0A0A;box-shadow:0 0 0 3px rgba(10,10,10,0.06);background:#fff}
  .text-input::placeholder{color:#BCBFCC}
  .text-input.has-icon{padding-left:44px}
  .input-wrapper{position:relative;margin-bottom:14px}
  .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:#9DA2B3}

  /* === CONTINUE / SUBMIT === */
  .continue-btn{width:100%;padding:14px;background:#0A0A0A;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all 200ms;font-family:'Manrope',sans-serif;min-height:52px;margin-top:20px}
  .continue-btn:hover{background:#1E1E24}
  .submit-btn{width:100%;padding:14px;background:#C5A35D;color:#0A0A0A;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all 200ms;font-family:'Manrope',sans-serif;min-height:52px;margin-top:20px}
  .submit-btn:hover{background:#d4b36c}

  /* === ERROR === */
  .error-msg{color:#dc2626;font-size:13px;font-weight:500;margin-top:10px}

  /* === TRUST BADGES (bottom) === */
  
  .trust-badge{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;color:#6E7180;font-weight:500;text-align:center}
  .trust-badge svg{flex-shrink:0}
  
  

  
  /* === LANDING HEADER (step 0 only) === */
  .landing-header{background:#fff;padding:24px 20px 16px;text-align:center}
  .landing-header h1{font-size:22px;font-weight:800;color:#1E1E24;margin-bottom:8px;line-height:1.3}
  .landing-header p{font-size:13px;color:#6E7180;max-width:400px;margin:0 auto;line-height:1.5}
  @media(min-width:640px){.landing-header h1{font-size:26px}.landing-header p{font-size:14px}}
  .landing-steps{display:flex;align-items:center;justify-content:center;gap:0;max-width:360px;margin:0 auto;padding:0}
  .landing-step{display:flex;flex-direction:column;align-items:center;gap:5px}
  .landing-step-num{width:30px;height:30px;border-radius:50%;background:#EDEFF7;color:#9DA2B3;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .landing-step-num.active{background:#C5A35D;color:#0A0A0A}
  .landing-step-text{font-size:9px;font-weight:600;color:#9DA2B3;white-space:nowrap;letter-spacing:0.3px}
  .landing-step-text.active{color:#1E1E24}
  .landing-line{flex:1;height:4px;background:#EDEFF7;border-radius:100px;margin:0 6px;margin-bottom:20px;position:relative;overflow:hidden}

  /* === LEGAL === */
  .legal-text{text-align:center;font-size:11px;color:#9DA2B3;margin-top:14px;line-height:1.5}
  .legal-text a{color:#6E7180;text-decoration:underline}
</style>

<!-- MAIN -->

<script>
const TOTAL_STEPS = 11;

function renderTrustBadges() {
  return '<div style="display:flex;justify-content:center;gap:20px;margin-top:24px;padding-top:20px;border-top:1px solid #EDEFF7;">' +
    '<div class="trust-badge"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C5A35D" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span style="font-size:10px;line-height:1.2;">Won\'t affect<br>credit score</span></div>' +
    '<div class="trust-badge"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C5A35D" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span style="font-size:10px;line-height:1.2;">Fast<br>approval</span></div>' +
    '<div class="trust-badge"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C5A35D" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg><span style="font-size:10px;line-height:1.2;">Takes<br>2 minutes</span></div>' +
  '</div>' +
  '<div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;">' +
    '<div style="display:flex;gap:2px;">' +
      '<svg width="12" height="12" viewBox="0 0 24 24" fill="#C5A35D"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'.repeat(5) +
    '</div>' +
    '<span style="font-size:11px;color:#6E7180;font-weight:600;">4.8 from 586+ customers</span>' +
  '</div>';
}
 // 0-8

const AMOUNT_OPTIONS = ['$250,000+','$100,000 – $249,999','$50,000 – $99,999','$10,000 – $49,999','Under $10,000'];
const TIME_OPTIONS = ['3+ years','2 – 3 years','1 – 2 years','6 – 12 months','Less than 6 months'];
const LOAN_PURPOSE = ['Expansion','Equipment Purchase','Inventory','Working Capital','Remodel My Location','Finance Accounts Receivable','Other'];
const MONTHLY_SALES = ['$0 – $20,000','$20,000 – $50,000','$50,000 – $150,000','$150,000 – $350,000','$350,000 – $750,000','$750,000 – $1.5M','$1.5M+'];
const CREDIT_RANGES = ['Excellent (720+)','Good (690 – 719)','Fair (500 – 619)','Poor (Below 500)'];
const TIMELINE_OPTIONS = ['Immediately','Within 1 week','Within 2 weeks','Unsure, just browsing'];

let currentStep = 0;
let data = {
  amount:'', timeInBusiness:'', hasBankAccount:'', loanPurpose:'',
  monthlySales:'', creditScore:'',
  fundingTimeline:'', fullName:'', email:'', phone:''
};

function formatPhone(val) {
  const d = val.replace(/\D/g,'').slice(0,10);
  if (d.length<=3) return d;
  if (d.length<=6) return '('+d.slice(0,3)+') '+d.slice(3);
  return '('+d.slice(0,3)+') '+d.slice(3,6)+'-'+d.slice(6);
}

function updateProgress() {
  // Steps 0-3 = Business (group 0), Steps 4-7 = Financial (group 1), Steps 8-10 = Your Info (group 2)
  var group;
  if (currentStep <= 3) group = 0;
  else if (currentStep <= 8) group = 1;
  else group = 2;

  // Steps within each group for connector fill
  var groupSteps = [
    {start:0, end:3},  // Business: steps 0-3
    {start:4, end:8},  // Financial: steps 4-8
    {start:9, end:10}  // Your Info: steps 9-10
  ];

  var dots = document.querySelectorAll('.progress-dot');
  var steps = document.querySelectorAll('.progress-step');
  var connectors = document.querySelectorAll('.progress-connector-fill');
  var check = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>';

  for (var i = 0; i < 3; i++) {
    dots[i].className = 'progress-dot';
    steps[i].className = 'progress-step';

    if (i < group) {
      // Completed
      dots[i].classList.add('completed');
      steps[i].classList.add('completed');
      dots[i].innerHTML = check;
      if (i < connectors.length) connectors[i].style.width = '100%';
    } else if (i === group) {
      // Active
      dots[i].classList.add('active');
      steps[i].classList.add('active');
      dots[i].textContent = (i + 1);
      // Fill connector based on progress within group
      if (i < connectors.length) {
        var g = groupSteps[i];
        var withinPct = ((currentStep - g.start) / (g.end - g.start)) * 100;
        connectors[i].style.width = Math.min(100, withinPct) + '%';
      }
    } else {
      // Pending
      dots[i].textContent = (i + 1);
      if (i < connectors.length) connectors[i].style.width = '0%';
      if (i > 0 && i - 1 < connectors.length) {
        // previous connector might need reset
      }
    }
  }
}

function renderBack() {
  if (currentStep===0) return '';
  return '<button class="back-btn" onclick="goBack()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Back</button>';
}

function renderOptions(items, field) {
  return '<div class="option-list">' + items.map(item =>
    '<button class="opt-btn'+(data[field]===item?' selected':'')+'" onclick="autoAdvance(\''+field+'\',\''+item.replace(/'/g,"\\'")+'\')">' + item + '</button>'
  ).join('') + '</div>';
}

function renderToggle(field) {
  return '<div class="toggle-row">' +
    '<button class="toggle-btn'+(data[field]==='Yes'?' selected':'')+'" onclick="autoAdvance(\''+field+'\',\'Yes\')">Yes</button>' +
    '<button class="toggle-btn'+(data[field]==='No'?' selected':'')+'" onclick="autoAdvance(\''+field+'\',\'No\')">No</button></div>';
}

function renderStep() {
  const c = document.getElementById('question-container');
  let html = '';

  switch(currentStep) {
    case 0:
      html = '<h2 class="question-title">How much funding are you looking for?</h2>' +
        renderOptions(AMOUNT_OPTIONS,'amount') + renderTrustBadges();
      break;
    case 1:
      html = renderBack() + '<h2 class="question-title">How long have you been in business?</h2>' +
        '<p style="text-align:center;font-size:14px;color:#6E7180;margin-top:-14px;margin-bottom:24px;line-height:1.5;">Your business\'s age helps lenders understand its eligibility for financing.</p>' +
        renderOptions(TIME_OPTIONS,'timeInBusiness') + renderTrustBadges();
      break;
    case 2:
      html = renderBack() + '<h2 class="question-title">Do you have a business bank account?</h2>' +
        '<p style="text-align:center;font-size:14px;color:#6E7180;margin-top:-14px;margin-bottom:24px;line-height:1.5;">Some lenders require a business bank account.</p>' +
        renderToggle('hasBankAccount') + renderTrustBadges();
      break;
    case 3:
      html = renderBack() + '<h2 class="question-title">Have you defaulted on a business loan before?</h2>' +
        '<p style="text-align:center;font-size:14px;color:#6E7180;margin-top:-14px;margin-bottom:24px;line-height:1.5;">Some lenders require decent business loan history.</p>' +
        renderToggle('defaultedOnLoan') + renderTrustBadges();
      break;
    case 4:
      html = renderBack() + '<h2 class="question-title">What will you primarily use the business loan for?</h2>' +
        '<p style="text-align:center;font-size:14px;color:#6E7180;margin-top:-14px;margin-bottom:24px;line-height:1.5;">This helps us match you with lenders that fit your needs.</p>' +
        renderOptions(LOAN_PURPOSE,'loanPurpose') + renderTrustBadges();
      break;
    case 5:
      html = renderBack() + '<h2 class="question-title">What are your average monthly sales?</h2>' +
        '<p style="text-align:center;font-size:14px;color:#6E7180;margin-top:-14px;margin-bottom:24px;line-height:1.5;">This will help lenders assess the right loan terms for you.</p>' +
        renderOptions(MONTHLY_SALES,'monthlySales') + renderTrustBadges();
      break;
    case 6:
      html = renderBack() + '<h2 class="question-title">Do you have access to your last 4 months\' bank statements?</h2>' +
        '<p style="text-align:center;font-size:14px;color:#6E7180;margin-top:-14px;margin-bottom:24px;line-height:1.5;">In order for a lender to fund your business, they need to track revenue.</p>' +
        renderToggle('hasBankStatements') + renderTrustBadges();
      break;
    case 7:
      html = renderBack() + '<h2 class="question-title">What is your approximate credit score?</h2>' +
        '<p style="text-align:center;font-size:14px;color:#6E7180;margin-top:-14px;margin-bottom:24px;line-height:1.5;">Don\'t worry, this will not affect your credit score. Knowing your score will help lenders determine your loan rate.</p>' +
        renderOptions(CREDIT_RANGES,'creditScore') + renderTrustBadges();
      break;
    case 8:
      html = renderBack() + '<h2 class="question-title">How fast are you looking to get funded?</h2>' +
        '<p style="text-align:center;font-size:14px;color:#6E7180;margin-top:-14px;margin-bottom:24px;line-height:1.5;">This helps us know the timeframe of your funding needs.</p>' +
        renderOptions(TIMELINE_OPTIONS,'fundingTimeline') + renderTrustBadges();
      break;
    case 9:
      html = renderBack() +
        '<h2 class="question-title" style="color:#C5A35D;">Only a few more questions!</h2>' +
        '<p style="text-align:center;font-size:17px;color:#6E7180;margin-top:-14px;margin-bottom:24px;line-height:1.5;font-weight:600;">What is your full name?</p>' +
        '<div class="input-wrapper"><input type="text" class="text-input" id="full-name" placeholder="First and last name" value="'+(data.fullName||'')+'" oninput="data.fullName=this.value" onkeydown="if(event.key===\'Enter\')goNext()"></div>' +
        '<div id="error-area"></div><button class="continue-btn" onclick="goNext()">Continue</button>';
      break;
    case 10:
      html = renderBack() +
        '<div style="text-align:center;margin-bottom:16px;">' +
          '<div style="width:52px;height:52px;border-radius:50%;background:#C5A35D;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>' +
        '</div>' +
        '<h2 class="question-title" style="margin-bottom:6px;font-size:26px;">Your Quote Is Almost Ready!</h2>' +
        '<p style="text-align:center;font-size:14px;color:#1E1E24;margin-bottom:6px;line-height:1.5;font-weight:700;">We found <span style=\'color:#C5A35D;font-size:18px;font-weight:800;\'>1 lender</span> matching your profile.</p>' +
        '<p style="text-align:center;font-size:13px;color:#6E7180;margin-bottom:20px;line-height:1.5;">Enter your contact info below and we\'ll send your personalized quote with rates, terms, and funding amounts directly to you.</p>' +
        '' +
        '<div class="input-wrapper"><input type="email" inputmode="email" class="text-input" id="email-input" placeholder="Email address" value="'+(data.email||'')+'" oninput="data.email=this.value;var ea=document.getElementById(\'error-area\');if(ea)ea.innerHTML=\'\'" onkeydown="if(event.key===\'Enter\')document.getElementById(\'phone-input\').focus()"></div>' +
        '<div class="input-wrapper"><div class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>' +
        '<input type="tel" inputmode="tel" class="text-input has-icon" id="phone-input" placeholder="(555) 123-4567" value="'+(data.phone||'')+'" oninput="data.phone=formatPhone(this.value);this.value=data.phone;var ea=document.getElementById(\'error-area\');if(ea)ea.innerHTML=\'\'" onkeydown="if(event.key===\'Enter\')sendOTP()"></div>' +
        '<div id="otp-section" style="display:none;margin-top:16px;">' +
          '<p style="text-align:center;font-size:13px;color:#6E7180;margin-bottom:10px;">Enter the 6-digit code sent to your phone</p>' +
          '<input type="text" inputmode="numeric" class="text-input" id="otp-input" placeholder="000000" maxlength="6" style="text-align:center;font-size:24px;letter-spacing:8px;font-weight:700;" onkeydown="if(event.key===\'Enter\')verifyOTP()" oninput="if(this.value.length===6)verifyOTP()">' +
          '<p id="otp-status" style="text-align:center;font-size:12px;color:#6E7180;margin-top:8px;"></p>' +
          '<button style="background:none;border:none;color:#C5A35D;font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;width:100%;text-align:center;font-family:inherit;" onclick="sendOTP()">Resend Code</button>' +
        '</div>' +
        '<div style="display:flex;align-items:flex-start;gap:8px;margin-top:20px;">' +
        '<input type="checkbox" id="consent-check" style="width:18px;height:18px;margin-top:2px;flex-shrink:0;accent-color:#0A0A0A;">' +
        '<label for="consent-check" style="font-size:11px;color:#6E7180;line-height:1.5;cursor:pointer;">By submitting my application, I consent to the <a href=\"#\" style=\"color:#0A0A0A;text-decoration:underline;\">Disclaimer</a>, <a href=\"#\" style=\"color:#0A0A0A;text-decoration:underline;\">Privacy Policy</a>, and <a href=\"#\" style=\"color:#0A0A0A;text-decoration:underline;\">Terms of Service</a>, as well as Cardova Capital and its partners contacting me via phone, email, and SMS.</label>' +
        '</div>' +
        '<div id="error-area"></div>' +
        '<button class="submit-btn" id="submit-btn" onclick="sendOTP()">Verify Phone & Get My Quote</button>';
      break;
  }

  c.innerHTML = html;

  // Show/hide headline for step 0
  var landingH1 = document.querySelector('.landing-header h1');
  var landingHeader = document.getElementById('landing-header');
  if (currentStep === 0) {
    if (landingH1) { landingH1.style.display = 'block'; landingH1.style.opacity = '1'; landingH1.style.transform = 'translateX(0)'; }
    if (landingHeader) landingHeader.style.display = 'block';
  } else {
    if (landingH1) landingH1.style.display = 'none';
    if (landingHeader) landingHeader.style.display = 'none';
  }

  // Update the step indicators
  var stepNums = document.querySelectorAll('.landing-step-num');
  var stepTexts = document.querySelectorAll('.landing-step-text');
  var group;
  if (currentStep <= 4) group = 0;
  else if (currentStep <= 8) group = 1;
  else group = 2;
  var check = '\u2713';
  var lineFills = document.querySelectorAll('.landing-line-fill');
  var groupSteps = [{start:0,end:4},{start:5,end:8},{start:9,end:10}];
  for (var i = 0; i < 3; i++) {
    stepNums[i].className = 'landing-step-num';
    stepTexts[i].className = 'landing-step-text';
    if (i < group) {
      stepNums[i].classList.add('active');
      stepNums[i].textContent = check;
      stepTexts[i].classList.add('active');
      if (i < lineFills.length) lineFills[i].style.width = '100%';
    } else if (i === group) {
      stepNums[i].classList.add('active');
      stepNums[i].textContent = (i + 1);
      stepTexts[i].classList.add('active');
      if (i < lineFills.length) {
        var g = groupSteps[i];
        var pct = ((currentStep - g.start) / (g.end - g.start)) * 100;
        lineFills[i].style.width = Math.min(100, pct) + '%';
      }
    } else {
      stepNums[i].textContent = (i + 1);
      if (i < lineFills.length) lineFills[i].style.width = '0%';
    }
  }

  setTimeout(() => {
    const el = document.getElementById('full-name') || document.getElementById('email-input');
    if (el) el.focus();
  }, 280);
}

function autoAdvance(field, value) {
  data[field] = value;
  renderStep(); // show selected state
  setTimeout(() => {
    if (currentStep === 0) {
      // First question - slide h1 and question together, keep progress bar
      var h1 = document.querySelector('.landing-header h1');
      var c = document.getElementById('question-container');
      var main = document.querySelector('.main-area');
      if (h1) { h1.style.transition = 'all 150ms ease-out'; h1.style.opacity = '0'; h1.style.transform = 'translateX(-60px)'; }
      main.style.transition = 'all 150ms ease-out';
      main.style.opacity = '0';
      main.style.transform = 'translateX(-60px)';
      setTimeout(() => {
        currentStep++;
        renderStep();
        main.style.transition = 'none';
        main.style.transform = 'translateX(60px)';
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            main.style.transition = 'all 150ms ease-out';
            main.style.opacity = '1';
            main.style.transform = 'translateX(0)';
          });
        });
      }, 150);
    } else {
      transition(() => { currentStep++; });
    }
  }, 200);
}

function validate() {
  const ea = document.getElementById('error-area');
  if (!ea) return true;
  ea.innerHTML = '';
  switch(currentStep) {
    case 9:
      if (!data.fullName || !data.fullName.trim()) {
        ea.innerHTML='<p class="error-msg">Please enter your name</p>'; return false;
      }
      return true;
    case 10:
      if (!phoneVerified) {
        ea.innerHTML='<p class="error-msg">Please verify your phone number first</p>'; return false;
      }
      if (!document.getElementById('consent-check') || !document.getElementById('consent-check').checked) {
        ea.innerHTML='<p class="error-msg">Please agree to the terms to continue</p>'; return false;
      }
      var em = (data.email||'').trim();
      if (!em || em.indexOf('@') === -1 || em.indexOf('.') === -1) {
        ea.innerHTML='<p class="error-msg">Please enter a valid email address</p>'; return false;
      }
      var ph = (data.phone||'').replace(/\D/g,'');
      if (ph.length !== 10) {
        ea.innerHTML='<p class="error-msg">Please enter a valid 10-digit phone number</p>'; return false;
      }
      return true;
  }
  return true;
}

function transition(callback, reverse) {
  var c = document.getElementById('question-container');
  c.style.transition = 'all 100ms ease-out';
  c.style.opacity = '0';
  c.style.transform = reverse ? 'translateX(40px)' : 'translateX(-40px)';
  setTimeout(() => {
    callback();
    renderStep();
    c.style.transition = 'none';
    c.style.transform = reverse ? 'translateX(-40px)' : 'translateX(40px)';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        c.style.transition = 'all 100ms ease-out';
        c.style.opacity = '1';
        c.style.transform = 'translateX(0)';
      });
    });
  }, 100);
}

function goNext() {
  if (!validate()) return;
  transition(() => { currentStep++; });
}

function goBack() {
  transition(() => { currentStep--; }, true);
}

function isQualified(d) {
  // Hard disqualifier - instant fail
  if (d.monthlySales === "$0 \u2013 $20,000") return false;
  // Strike system for everything else
  var strikes = 0;
  if (d.timeInBusiness === "Less than 6 months") strikes++;
  if (d.creditScore === "Poor (Below 500)") strikes++;
  return strikes <= 1;
}

var phoneVerified = false;

async function sendOTP() {
  var ea = document.getElementById('error-area');
  ea.innerHTML = '';
  var ph = (data.phone||'').replace(/\D/g,'');
  if (ph.length !== 10) {
    ea.innerHTML = '<p class="error-msg">Please enter a valid 10-digit phone number</p>';
    return;
  }
  var em = (data.email||'').trim();
  if (!em || em.indexOf('@') === -1 || em.indexOf('.') === -1) {
    ea.innerHTML = '<p class="error-msg">Please enter a valid email address</p>';
    return;
  }
  if (!document.getElementById('consent-check').checked) {
    ea.innerHTML = '<p class="error-msg">Please agree to the terms to continue</p>';
    return;
  }

  var btn = document.getElementById('submit-btn');
  btn.textContent = 'Sending code...';
  btn.disabled = true;

  try {
    var resp = await fetch('/api/send-code', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({phone: data.phone})
    });
    var result = await resp.json();
    if (result.success) {
      document.getElementById('otp-section').style.display = 'block';
      document.getElementById('otp-input').focus();
      btn.textContent = 'Waiting for verification...';
      document.getElementById('otp-status').textContent = 'Code sent to ' + data.phone;
      document.getElementById('otp-status').style.color = '#C5A35D';
    } else {
      ea.innerHTML = '<p class="error-msg">' + (result.error || 'Failed to send code') + '</p>';
      btn.textContent = 'Verify Phone & Get My Quote';
      btn.disabled = false;
    }
  } catch(e) {
    ea.innerHTML = '<p class="error-msg">Failed to send code. Please try again.</p>';
    btn.textContent = 'Verify Phone & Get My Quote';
    btn.disabled = false;
  }
}

async function verifyOTP() {
  var code = document.getElementById('otp-input').value.trim();
  if (code.length !== 6) return;

  var status = document.getElementById('otp-status');
  status.textContent = 'Verifying...';
  status.style.color = '#6E7180';

  try {
    var resp = await fetch('/api/verify-code', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({phone: data.phone, code: code})
    });
    var result = await resp.json();
    if (result.success) {
      phoneVerified = true;
      status.textContent = '✓ Phone verified!';
      status.style.color = '#22c55e';
      // Auto-submit after verification
      setTimeout(function() { submitForm(); }, 500);
    } else {
      status.textContent = 'Invalid code. Please try again.';
      status.style.color = '#dc2626';
      document.getElementById('otp-input').value = '';
      document.getElementById('otp-input').focus();
    }
  } catch(e) {
    status.textContent = 'Verification failed. Please try again.';
    status.style.color = '#dc2626';
  }
}

function submitForm() {
  if (!validate()) return;

  var qualified = isQualified(data);
  var payload = {
    timestamp: new Date().toLocaleString(),
    name: data.fullName || '',
    email: data.email || '',
    phone: data.phone || '',
    fundingAmount: data.amount || '',
    timeInBusiness: data.timeInBusiness || '',
    bankAccount: data.hasBankAccount || '',
    defaultedOnLoan: data.defaultedOnLoan || '',
    loanPurpose: data.loanPurpose || '',
    monthlySales: data.monthlySales || '',
    bankStatements: data.hasBankStatements || '',
    creditScore: data.creditScore || '',
    fundingTimeline: data.fundingTimeline || '',
    qualified: qualified ? 'Yes' : 'No',
    sheet: qualified ? 'Qualified' : 'Not Qualified'
  };

  // Use sendBeacon for guaranteed delivery (survives page redirect)
  var GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyoJ2xxc7MG5vIdb51pZIgvrNdDBhbt2rdnwsOvy8nvH51hJvQB1FdwJ8rXq1N17CLp/exec';
  fetch(GOOGLE_SCRIPT_URL, {method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload),keepalive:true}).catch(function(){});

  // Slack notification
  var emoji = qualified ? '🟢' : '🔴';
  var status = qualified ? 'Qualified Lead' : 'Unqualified Lead';
  var slackMsg = {
    text: emoji + ' <!channel> *New ' + status + '*\n' +
      '>*Name:* ' + (data.fullName || 'N/A') + '\n' +
      '>*Phone:* ' + (data.phone || 'N/A') + '\n' +
      '>*Email:* ' + (data.email || 'N/A') + '\n' +
      '>*Funding:* ' + (data.amount || 'N/A') + '\n' +
      '>*Time in Business:* ' + (data.timeInBusiness || 'N/A') + '\n' +
      '>*Monthly Sales:* ' + (data.monthlySales || 'N/A') + '\n' +
      '>*Credit Score:* ' + (data.creditScore || 'N/A') + '\n' +
      '>*Bank Account:* ' + (data.hasBankAccount || 'N/A') + '\n' +
      '>*Defaulted:* ' + (data.defaultedOnLoan || 'N/A') + '\n' +
      '>*Bank Statements:* ' + (data.hasBankStatements || 'N/A') + '\n' +
      '>*Loan Purpose:* ' + (data.loanPurpose || 'N/A') + '\n' +
      '>*Timeline:* ' + (data.fundingTimeline || 'N/A')
  };
  fetch('/api/notify', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:slackMsg.text}),keepalive:true}).catch(function(){});

  // Make.com webhook (qualified leads only)
  if (qualified) {
    var webhookData = {
      fullName: String(data.fullName || ''),
      email: String(data.email || ''),
      phone: String(data.phone || ''),
      loanRequest: String(data.amount || ''),
      monthlyRevenue: String(data.monthlySales || '')
    };
    fetch('https://hook.us2.make.com/otbcpkurg5q1syxapsvbt5y8r1nk9d28', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(webhookData),keepalive:true}).catch(function(){});
  }

  var params = new URLSearchParams({
    name: data.fullName || '',
    email: data.email || '',
    phone: data.phone || '',
    amount: data.amount || '',
    credit: data.creditScore || '',
    sales: data.monthlySales || ''
  }).toString();

  // sendBeacon guarantees delivery - redirect immediately
  setTimeout(function() {
    if (qualified) {
      window.location.href = '/qualified?' + params;
    } else {
      window.location.href = '/thankyou';
    }
  }, 500);
}

// === READ URL PARAMS ===
function getAmountRange(amount) {
  amount = parseInt(amount);
  if (isNaN(amount)) return null;
  if (amount >= 250000) return '$250,000+';
  if (amount >= 100000) return '$100,000 – $249,999';
  if (amount >= 50000) return '$50,000 – $99,999';
  if (amount >= 10000) return '$10,000 – $49,999';
  return 'Under $10,000';
}

(function initFromParams() {
  const params = new URLSearchParams(window.location.search);
  const amountParam = params.get('amount');
  if (amountParam) {
    const range = getAmountRange(amountParam);
    if (range) {
      data.amount = range;
      currentStep = 1; // Skip to next question since amount is pre-selected
    }
  }
})();

// Init
renderStep();
</script>
